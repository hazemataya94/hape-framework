apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hape-dora-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: hape-dora-exporter
  endpoints:
  - port: metrics
    path: /metrics
    interval: 60s
